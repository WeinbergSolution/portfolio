<section class="friends">
  <div class="friends__content-header">
    <h2>{{ 'friends.headline' | translate }}</h2>
  </div>
  <div class="friends__content-card--quotes">
    <img src="icon/quotes.png" alt="quotes" />
  </div>
  <div class="friends__content-card">
    <p>{{ 'friends.friendOneAnswer' | translate }}</p>
    <div class="friends__stripe__name">
      <div class="friends__stripes">
        <div class="friends__stripe"></div>
      </div>
      <div class="friends_name">
        <p class="friends__name">{{ 'friends.friendOne' | translate }}</p>
      </div>
    </div>
  </div>
  <div class="friends__navigate-wrapper">
    <div class="friends__navigate">
      <div>
        <img class="arrow" src="icon/arrow_back.png" alt="left arrow" />
      </div>
      <div class="friends__navigate--dots">
        <img src="icon/Ellipse.png" alt="dot" />
        <img src="icon/EllipseClick.png" alt="dot" />
        <img src="icon/Ellipse.png" alt="dot" />
      </div>

      <div><img class="arrow" src="icon/arrow_forward.png" alt="right arrow" /></div>
    </div>
  </div>
</section>
