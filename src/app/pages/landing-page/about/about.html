<section class="about">
  <div class="about__img">
    <img src="img/about_picture.jpg" alt="About Us" />
  </div>
  <div class="about__text">
    <p>{{ 'about.headline' | translate }}</p>
  </div>
  <div class="about__content">
    <h2>{{ 'about.aboutMe' | translate }}</h2>
    <div class="about__wrapper-descriptionOne">
      <p>{{ 'about.descriptionOne' | translate }}</p>
    </div>
    <div class="about__wrapper-descriptionTwo">
      <div class="about__line-image">
        <img src="img/location.png" alt="Location Icon" class="about__icon" />
      </div>
      <div class="about__line-text">
        <p>{{ 'about.descriptionTwo' | translate }}</p>
      </div>
    </div>
    <div class="about__wrapper-descriptionThree">
      <img src="img/cognition.png" alt="Cognition Icon" class="about__icon" />
      <p>{{ 'about.descriptionThree' | translate }}</p>
    </div>
    <div class="about__wrapper-descriptionFour" id="about">
      <img src="img/Check_icon.png" alt="Check Icon" class="about__icon" />
      <p>{{ 'about.descriptionFour' | translate }}</p>
    </div>
  </div>
</section>
